<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Petal Container -->
<div class="petal-container"></div>

<!-- Navigation -->
<nav>
  <div class="logo">A & B</div>
  <div>
    <a href="#story">Story</a>
    <a href="#details">Details</a>
    <a href="#gallery">Gallery</a>
    <a href="#rsvp">RSVP</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero" style="background-image:url('image/hero.jpg');">
  <div class="hero-content">
    <h1>Anna & Ben</h1>
    <p>ARE GETTING MARRIED</p>
    <div class="countdown" id="countdown"></div>
  </div>
</section>

<!-- Story -->
<section id="story" class="story">
  <h2>Our Story</h2>
  <p>A beautiful journey that started with friendship and grew into forever.</p>
</section>

<!-- Details -->
<section id="details" class="details">
  <h2>Wedding Details</h2>
  <p>June 25, 2026</p>
  <p>St. Mary's Church</p>
  <p>Reception at Grand Hall</p>
</section>

<!-- Gallery -->
<section id="gallery" class="gallery">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides">
      <img src="image/gallery1.jpg">
      <img src="image/gallery2.jpg">
      <img src="image/gallery3.jpg">
    </div>
  </div>
</section>

<!-- RSVP -->
<section id="rsvp" class="rsvp">
  <h2>RSVP</h2>
  <form>
    <input type="text" placeholder="Full Name" required>
    <select required>
      <option value="">Will you attend?</option>
      <option>Yes, with joy!</option>
      <option>Sadly, no</option>
    </select>
    <button type="submit">Submit</button>
  </form>
</section>

<!-- Footer -->
<footer>
  With love, Anna & Ben
</footer>

<!-- Countdown Script -->
<script>
const weddingDate = new Date("June 25, 2026 15:00:00").getTime();
const countdown = document.getElementById("countdown");

setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  countdown.innerHTML = days + " Days " + hours + " Hours " + minutes + " Minutes";
}, 1000);
</script>

<!-- Falling Petals Script -->
<script>
const petalContainer = document.querySelector('.petal-container');

const flowerImages = [
  "image/flower1.png",
  "image/flower2.png",
  "image/flower3.png"
];

function createPetal(){
  const petal = document.createElement("img");
  petal.src = flowerImages[Math.floor(Math.random() * flowerImages.length)];
  petal.classList.add("petal");

  petal.style.left = Math.random() * 100 + "vw";

  const size = Math.random() * 25 + 15;
  petal.style.width = size + "px";

  const duration = Math.random() * 5 + 8;
  petal.style.animationDuration = duration + "s";

  petalContainer.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, duration * 1000);
}

setInterval(createPetal, 500);
</script>

</body>
</html>
