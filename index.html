<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Petal Layer -->
<div class="petal-container"></div>

<!-- Navigation -->
<nav>
  <div class="logo">A & B</div>
  <div>
    <a href="#story">Story</a>
    <a href="#details">Details</a>
    <a href="#gallery">Gallery</a>
    <a href="#rsvp">RSVP</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero" style="background-image:url('image/hero.jpg');">
  <div class="hero-content">
    <h1>Anna & Ben</h1>
    <p>ARE GETTING MARRIED</p>
    <div id="countdown"></div>
  </div>
</section>

<!-- Story -->
<section id="story">
  <h2>Our Story</h2>
  <p>A beautiful journey that started with friendship and grew into forever.</p>
</section>

<!-- Details -->
<section id="details">
  <h2>Wedding Details</h2>
  <p>June 25, 2026</p>
  <p>St. Mary's Church</p>
  <p>Reception at Grand Hall</p>
</section>

<!-- Gallery -->
<section id="gallery">
  <h2>Gallery</h2>
  <div class="slider">
    <div class="slides">
      <img src="image/gallery1.jpg">
      <img src="image/gallery2.jpg">
      <img src="image/gallery3.jpg">
    </div>
  </div>
</section>

<!-- RSVP -->
<section id="rsvp">
  <h2>RSVP</h2>
  <form>
    <input type="text" placeholder="Full Name" required>
    <select required>
      <option value="">Will you attend?</option>
      <option>Yes, with joy!</option>
      <option>Sadly, no</option>
    </select>
    <button type="submit">Submit</button>
  </form>
</section>

<footer>
  With love, Anna & Ben
</footer>

<!-- PETAL SCRIPT -->
<script>
const container = document.querySelector(".petal-container");

const images = [
  "image/flower1.png",
  "image/flower2.png",
  "image/flower3.png"
];

let maxPetals = 20;
let current = 0;

function spawnPetal(){
  if(current >= maxPetals) return;

  const petal = document.createElement("img");
  petal.src = images[Math.floor(Math.random()*images.length)];
  petal.classList.add("petal");

  // random horizontal start
  petal.style.left = Math.random() * 100 + "vw";

  // random size
  const size = Math.random() * 20 + 18;
  petal.style.width = size + "px";

  // random duration
  const duration = Math.random() * 4 + 8;
  petal.style.animationDuration = duration + "s";

  container.appendChild(petal);
  current++;

  setTimeout(()=>{
    petal.remove();
    current--;
  }, duration * 1000);
}

setInterval(spawnPetal, 800);
</script>

</body>
</html>
