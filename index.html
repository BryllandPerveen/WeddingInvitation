<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bryll & Perveen - Wedding Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>

<header id="header">
    <nav>
        <div class="logo">B & P</div>
    </nav>
</header>

<section id="home" class="hero">
    <div class="hero-content">

        <p class="pre-title">You are cordially invited</p>

        <h1 class="names">
            Bryll<br>
            <span>&</span><br>
            Perveen
        </h1>

        <div class="divider"></div>

        <!-- Countdown Timer -->
        <div id="countdown" class="countdown">
            <div><span id="days">00</span><small>Days</small></div>
            <div><span id="hours">00</span><small>Hours</small></div>
            <div><span id="minutes">00</span><small>Minutes</small></div>
            <div><span id="seconds">00</span><small>Seconds</small></div>
        </div>

        <div class="date-display">
            April 23, 2026 • 3:00 PM
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
